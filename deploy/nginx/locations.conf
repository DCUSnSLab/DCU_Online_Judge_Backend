location /public {
    root /data;
}

location /api {
    include api_proxy.conf;
}

location /llm/ {
    proxy_pass http://dcucode-llm-gateway.vllm-workspace:18000;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    chunked_transfer_encoding on;
}

location /ssh {
    proxy_pass http://ssh-server:8080/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}

location /sso/ {
    # dcu-sso (path prefix) — 외부 /sso/* → backend 내부 /* 로 strip.
    # SSO 측 SSO_PATH_PREFIX=/sso · FORCE_SCRIPT_NAME=/sso 환경 필요.
    proxy_pass __SSO_BACKEND__;     # ← 예: http://dcu-sso:8000/  (끝 슬래시 필수 — strip 역할)
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
}

location /admin {
    root /app/dist/admin;
    try_files $uri $uri/ /index.html =404;
}

location /.well-known/acme-challenge/ {
    root /app/dist;
}

location / {
    root /app/dist;
    try_files $uri $uri/ /index.html =404;
}
